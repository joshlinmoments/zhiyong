<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智勇人才班教材</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --jade:#6E9C8A; --jade-dark:#4F7A69; --paper:#F4ECDA; --paper-deep:#EADFC6;
  --ochre:#C8A063; --gold-deep:#B07F22; --cinnabar:#DC2B39; --ink:#2B2724; --ink-soft:#5A534B;
  --reading-scale:1;
  --line:#d8cba8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Noto Serif TC",serif; color:var(--ink);
  background:#FCFBF8;
  background-image:
    linear-gradient(rgba(252,251,248,.93), rgba(252,251,248,.93)),
    url("assets/paper-texture.jpg");
  background-size:auto, 760px;
  line-height:1.95;
}
/* fixed ink-wash backdrop — a faint hint so white stays dominant */
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:url("assets/cover-bg.jpg") center bottom / cover no-repeat;opacity:.10}
.brush{font-family:"Noto Serif TC",serif;font-weight:600}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer}
a{color:var(--jade-dark)}

/* ---------- top bar ---------- */
.topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;gap:.4rem;
  padding:0 .8rem;height:46px;background:#1c1c1c;border-bottom:1px solid #000;color:#fff}
body:not(.on-cover) #reader{padding-top:46px}
body.on-cover .topbar{display:none}
.topbar .home{font-family:"Noto Serif TC",serif;font-weight:500;font-size:.92rem;color:#fff;
  text-decoration:none;display:flex;align-items:center;gap:.4rem;letter-spacing:.04em}
.topbar .spacer{flex:1}
.seal-img{width:22px;height:22px;object-fit:contain;display:block}

/* uniform control sizing on the bar */
.topbar .tb-icon,.topbar .fsctl,.topbar .seg-toggle,.topbar .present-cta{
  height:28px;display:flex;align-items:center;font-size:.76rem}
.tb-icon{background:transparent;border:0;padding:0 .35rem;cursor:pointer}
.tb-icon svg line{stroke:#fff;stroke-width:1.7;stroke-linecap:round}
.tb-icon:hover svg line{stroke:#999}

/* font-size control (slider + number) */
.fsctl{gap:.4rem;border:1px solid #3a3a3a;border-radius:7px;background:#2a2a2a;padding:0 .6rem}
.fsctl .fs-ico{color:#d8d8d8;font-size:1rem;font-weight:700;font-family:"Noto Serif TC",serif;line-height:1}
.fsctl .fs-num{color:#fff;font-size:.72rem;min-width:2.6rem;text-align:right;font-variant-numeric:tabular-nums}
.fsctl input[type=range]{-webkit-appearance:none;appearance:none;width:78px;height:3px;border-radius:3px;
  background:#555;outline:none;cursor:pointer}
.fsctl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:#fff;cursor:pointer}
.fsctl input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:#fff;border:0;cursor:pointer}

/* browse / edit segmented toggle (icon buttons) */
.seg-toggle{border:1px solid #3a3a3a;border-radius:7px;overflow:hidden;background:#2a2a2a}
.seg-toggle button{border:0;background:transparent;color:#9a9a9a;height:100%;min-width:40px;
  display:flex;align-items:center;justify-content:center;padding:0 .55rem;cursor:pointer}
.seg-toggle button.seg-on{background:#fff;color:#1c1c1c}
.seg-toggle button svg{width:16px;height:16px;display:block}

/* present / 展示 — play icon, most prominent, far right */
.present-cta{border:0;border-radius:7px;background:#fff;color:#1c1c1c;
  padding:0 .9rem;cursor:pointer;margin-left:.1rem;justify-content:center}
.present-cta:hover{background:#e9e9e9}
.present-cta.on{background:var(--cinnabar);color:#fff}
.present-cta svg{width:15px;height:15px;display:block}

/* ---------- cover ---------- */
#cover{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3.4rem 1.2rem 4rem;text-align:center;position:relative;overflow:hidden;
  background:#13161a url("assets/cover-shanshui.jpg") center center / cover no-repeat;
  background-attachment:fixed;color:#EDE3CC}
#cover .scroll-bg{display:block;position:absolute;inset:0;z-index:0;
  background:linear-gradient(180deg, rgba(14,16,20,.60) 0%, rgba(14,16,20,.40) 45%, rgba(14,16,20,.80) 100%)}
#cover .inner{position:relative;z-index:1;width:100%;max-width:980px}
#cover .logo{width:300px;max-width:64vw;margin:0 auto .4rem;display:block;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,.45))}
#cover h1{font-family:"Noto Serif TC",serif;font-weight:500;font-size:clamp(1.4rem,3.4vw,2rem);
  letter-spacing:.55rem;color:#EDE3CC;margin:.2rem 0 .2rem;text-indent:.55rem}
#cover .sub{color:var(--ochre);letter-spacing:.4rem;font-size:.82rem;margin-bottom:2.6rem;opacity:.85}
.frontrow{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin:0 auto 2.6rem}
.frontrow .fcard{border:1px solid rgba(237,227,204,.22);border-radius:10px;background:rgba(255,255,255,.04);
  padding:.7rem 1.6rem;font-size:1.02rem;color:#EDE3CC;text-decoration:none;
  display:flex;align-items:center;gap:.55rem;transition:.18s}
.frontrow .fcard:hover{background:var(--gold-deep);border-color:var(--gold-deep);color:#fff}
.frontrow .fcard:hover .mk{color:#fff}
.frontrow .fcard .mk{color:var(--ochre);font-size:.95rem}

.toc-title{display:flex;align-items:center;gap:1rem;margin:1.6rem 0 1.2rem;color:rgba(237,227,204,.65);
  letter-spacing:.4rem;font-size:.9rem}
.toc-title::before,.toc-title::after{content:"";height:1px;background:rgba(237,227,204,.22);flex:1}
.chaptergrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:.7rem;text-align:left}
.chcard{display:flex;align-items:center;gap:.9rem;border:1px solid rgba(237,227,204,.13);border-radius:8px;
  background:rgba(255,255,255,.03);padding:.7rem 1.1rem;text-decoration:none;color:#EDE3CC;transition:.18s}
.chcard:hover{border-color:var(--gold-deep);background:var(--gold-deep);color:#fff}
.chcard:hover .num{color:#fff;border-right-color:rgba(255,255,255,.5)}
.chcard .num{font-size:.98rem;color:var(--ochre);min-width:2rem;text-align:center;letter-spacing:.04rem;
  border-right:1px solid rgba(237,227,204,.18);padding-right:.75rem}
.chcard .nm{font-size:1.02rem;font-weight:500;letter-spacing:.02rem}

/* ---------- reader ---------- */
#reader{min-height:100vh}
/* sidebar = left slide-in drawer, collapsed by default on all sizes */
#sb-scrim{position:fixed;inset:46px 0 0;z-index:39;background:rgba(26,25,22,.28);
  opacity:0;pointer-events:none;transition:opacity .26s}
#sb-scrim.open{opacity:1;pointer-events:auto}
#sidebar{position:fixed;left:0;top:46px;bottom:0;width:280px;max-width:82vw;z-index:40;
  background:var(--paper);border-right:1px solid var(--ochre);box-shadow:6px 0 26px rgba(43,39,36,.18);
  padding:1.1rem .7rem 3rem;overflow:auto;
  transform:translateX(-101%);transition:transform .26s cubic-bezier(.4,0,.2,1)}
#sidebar.open{transform:translateX(0)}
#sidebar .sb-home{display:block;font-family:"Noto Serif TC",serif;font-weight:600;color:var(--cinnabar);
  font-size:1.2rem;text-decoration:none;margin:.2rem .4rem 1rem}
.sb-ch{margin-bottom:.15rem}
.sb-ch>a{display:block;padding:.45rem .55rem;border-radius:7px;text-decoration:none;color:var(--ink);font-weight:500}
.sb-ch>a:hover{background:var(--paper-deep)}
.sb-ch.active>a{background:var(--gold-deep);color:#fff}
.sb-secs{margin:.1rem 0 .5rem .8rem;border-left:2px solid var(--line);padding-left:.3rem}
.sb-secs a{display:block;padding:.28rem .5rem;font-size:.92rem;color:var(--ink-soft);text-decoration:none;border-radius:6px}
.sb-secs a:hover{background:var(--paper-deep);color:var(--ink)}

#content{padding:2.2rem clamp(1rem,5vw,4rem) 6rem;max-width:880px;margin:0 auto;width:100%}
.present-btn{border:1px solid var(--line);background:#fff8ec;border-radius:999px;padding:.35rem .85rem;color:var(--ink-soft);font-size:.9rem}
.present-btn:hover{background:var(--paper-deep)}
.present-btn.on{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar)}
body.present-mode #content{max-width:none;padding:2.2rem clamp(1.5rem,4vw,5rem) 5rem}
/* chapter heading — a stamped seal number above a spacious title */
.ch-head{text-align:center;margin:2.6rem 0 3.4rem;padding-top:1.8rem}
.ch-head .seal-num{font-family:"Noto Serif TC",serif;font-weight:600;
  display:inline-flex;align-items:center;justify-content:center;
  width:clamp(64px,9.5vw,86px);height:clamp(64px,9.5vw,86px);
  font-size:clamp(2.05rem,4.3vw,2.75rem);color:#fff;background:var(--cinnabar);
  border-radius:12px;box-shadow:0 7px 20px rgba(220,43,57,.30);letter-spacing:0}
.ch-head h2{font-family:"Noto Serif TC",serif;font-weight:600;display:block;
  font-size:clamp(2.2rem,5.8vw,3.4rem);letter-spacing:.7rem;
  margin-top:1.5rem;text-indent:.7rem}
.sec-head{display:flex;align-items:center;margin:4.2rem 0 1.2rem}
.ch-head + .sec-head{margin-top:2.4rem}   /* first section sits closer to the chapter title */
.sec-head h3{font-size:calc(1.45rem * var(--reading-scale));font-weight:600;letter-spacing:.1rem}

.unit{font-size:calc(1.16rem * var(--reading-scale));margin:1.7rem 0 .9rem;text-align:justify}
.unit.prose{text-indent:0}
.unit.quote{position:relative;border-left:3px solid var(--gold-deep);padding:.2rem 0 .2rem 1.3rem;
  text-indent:0;font-size:calc(1.08rem * var(--reading-scale));color:#4a443c}

.motto-line{text-align:center;font-weight:600;letter-spacing:.35rem;
  font-size:calc(1.9rem * var(--reading-scale));margin:1.1rem 0;color:var(--ink)}

mark.anno{background:rgba(178,58,46,.16);border-bottom:2px solid var(--cinnabar);
  border-radius:2px;cursor:pointer;padding:0 1px}
mark.anno:hover{background:rgba(178,58,46,.28)}

/* selection floating button */
#sel-btn{position:absolute;z-index:50;display:none;background:var(--cinnabar);color:#fff;border:0;
  border-radius:999px;padding:.4rem .9rem;font-size:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.25)}

/* side panel (view annotation) */
#panel{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(26,25,22,.55);backdrop-filter:blur(2px);padding:1rem}
#panel.open{display:flex}
#panel .pcard{position:relative;background:var(--paper);border:1px solid var(--line);border-radius:14px;
  width:min(900px,94vw);max-height:88vh;overflow:auto;padding:2.2rem clamp(1.4rem,4vw,2.8rem) 2.4rem;
  box-shadow:0 20px 60px rgba(0,0,0,.45)}
#panel h4{font-family:"Noto Serif TC",serif;font-weight:600;color:var(--cinnabar);font-size:1.3rem;margin-bottom:.3rem}
#panel .quote-of{color:var(--ink-soft);border-left:3px solid var(--ochre);padding-left:.7rem;
  margin:.2rem 0 1.2rem;font-size:calc(1.05rem * var(--reading-scale))}
#panel .note{white-space:pre-wrap;font-size:calc(1.15rem * var(--reading-scale));line-height:1.95;margin-bottom:1.2rem}
#panel img{display:block;max-width:100%;max-height:74vh;margin:1rem auto;border-radius:8px;border:1px solid var(--line)}
#panel .note-title{font-weight:700;font-size:calc(1.7rem * var(--reading-scale));line-height:1.6}
#panel .embed{position:relative;width:100%;max-width:960px;margin:1rem auto;aspect-ratio:16/9;
  border-radius:8px;overflow:hidden;border:1px solid var(--line);background:#000}
#panel .embed iframe,#panel .embed video{position:absolute;inset:0;width:100%;height:100%;border:0}
.opt-row{display:flex;gap:.8rem;flex-wrap:wrap;margin:.55rem 0 .2rem}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg .seg-b{border:0;background:#fff8ec;color:var(--ink);padding:.42rem .85rem;font-size:.9rem;cursor:pointer}
.seg .seg-b.on{background:var(--jade);color:#fff}
.seg .seg-b+.seg-b{border-left:1px solid var(--line)}
#panel .lk{display:block;margin:.35rem 0;padding:.5rem .7rem;background:var(--paper);border-radius:7px;text-decoration:none}
#panel .close{position:fixed;top:1.1rem;right:1.3rem;z-index:6;width:42px;height:42px;border-radius:50%;
  border:0;background:rgba(43,39,36,.6);color:#fff;font-size:1.6rem;line-height:1;cursor:pointer;display:grid;place-items:center}
#panel .close:hover{background:rgba(43,39,36,.85)}
#panel .edit-actions{display:flex;gap:.6rem;margin-top:1rem}
#panel .edit-actions button{flex:1;border:0;border-radius:8px;padding:.55rem;color:#fff}
#panel .btn-edit{background:var(--jade)} #panel .btn-del{background:var(--cinnabar)}

/* modal (edit annotation) */
#overlay{position:fixed;inset:0;background:rgba(43,39,36,.5);z-index:70;display:none;align-items:center;justify-content:center;padding:1rem}
#overlay.open{display:flex}
.modal{background:var(--paper);border-radius:14px;width:min(560px,96vw);max-height:92vh;overflow:auto;padding:1.4rem}
.modal h3{font-family:"Noto Serif TC",serif;font-weight:600;color:var(--cinnabar);font-size:1.4rem;margin-bottom:.2rem}
.modal .target{background:rgba(178,58,46,.1);border-radius:8px;padding:.5rem .7rem;margin:.6rem 0 1rem;color:var(--ink)}
.modal label{display:block;font-weight:700;margin:.9rem 0 .35rem}
.modal textarea,.modal input[type=text],.modal input[type=url]{width:100%;border:1px solid var(--line);
  border-radius:8px;padding:.6rem;font-family:inherit;font-size:1rem;background:#fff8ec}
.modal textarea{min-height:90px;resize:vertical}
.imgrow,.lkrow{display:flex;gap:.5rem;margin:.4rem 0;align-items:center}
.imgrow img{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--line)}
.chip-x{border:0;background:var(--paper-deep);border-radius:6px;padding:.3rem .55rem}
.addbtn{border:1px dashed var(--jade);background:transparent;color:var(--jade-dark);border-radius:8px;padding:.45rem .8rem;margin-top:.4rem}
.modal .foot{display:flex;gap:.7rem;justify-content:flex-end;margin-top:1.4rem}
.modal .foot button{border:0;border-radius:9px;padding:.6rem 1.3rem;font-weight:700}
.btn-cancel{background:var(--paper-deep);color:var(--ink)}
.btn-save{background:var(--cinnabar);color:#fff}
.muted{color:var(--ink-soft);font-size:.85rem}

/* ---------- block editor ---------- */
/* edit toolbar — fixed single-row bar pinned to the bottom of the screen */
.edit-toolbar{position:fixed;left:0;right:0;bottom:0;z-index:25;display:flex;align-items:center;gap:.7rem;
  background:#2b2724;color:#f4ecda;padding:.55rem clamp(1rem,4vw,2.2rem);flex-wrap:nowrap;
  box-shadow:0 -4px 18px rgba(0,0,0,.28)}
.edit-toolbar .et-chap{font-weight:600;font-size:1.02rem;color:#fff;letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.et-nav{display:flex;gap:.4rem;margin-left:auto;flex:none}
.et-navbtn{border:1px solid #5a5048;background:#3a342e;color:#f4ecda;border-radius:6px;padding:.34rem .8rem;font-size:.84rem;cursor:pointer;white-space:nowrap}
.et-navbtn:hover:not(:disabled){background:#4a433b}
.et-navbtn:disabled{opacity:.35;cursor:default}
.edit-toolbar .et-export{flex:none;border:0;background:#fff;color:#2b2724;border-radius:7px;padding:.4rem .9rem;font-weight:600;cursor:pointer;white-space:nowrap}
body.edit-mode #content{padding-bottom:6rem}   /* clear space for the fixed bottom bar */
.eblock{border:1px solid var(--line);border-radius:9px;background:#fff;margin:.5rem 0;padding:.5rem .7rem;position:relative}
.eblock.dragging{opacity:.4}
.eblock.drop-before{box-shadow:0 -3px 0 var(--cinnabar)}
.eblock.drop-after{box-shadow:0 3px 0 var(--cinnabar)}
.eb-bar{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem}
.eb-drag{cursor:grab;color:#aaa;font-weight:700;letter-spacing:-2px;padding:0 .3rem;user-select:none}
.eb-drag:active{cursor:grabbing}
.eb-level{border:1px solid var(--line);border-radius:6px;padding:.2rem .4rem;font-family:inherit;font-size:.85rem;background:#fff8ec}
.eb-btn{border:1px solid var(--line);background:#fff8ec;border-radius:6px;padding:.22rem .55rem;font-size:.82rem;cursor:pointer;color:var(--ink)}
.eb-btn:hover{background:var(--paper-deep)}
.eb-ico{display:inline-flex;align-items:center;justify-content:center;width:30px;height:28px;padding:0;
  border:1px solid var(--line);background:#fff8ec;border-radius:6px;cursor:pointer;color:var(--ink-soft)}
.eb-ico:hover{background:var(--paper-deep);color:var(--ink)}
.eb-ico svg{width:16px;height:16px;display:block;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.eb-ico.eb-del{color:#b5402f;border-color:#e7c3bd}
.eb-ico.eb-del:hover{background:#f7e3df;color:#a23}
.eb-text{font-size:1.05rem;line-height:1.85;white-space:normal;padding:.1rem .2rem;cursor:text}
.eb-empty{color:#bbb}
.eb-edit{width:100%;border:1px solid var(--jade);border-radius:6px;padding:.5rem;font-family:inherit;
  font-size:1.05rem;line-height:1.85;resize:none;background:#fffdf7;min-height:2.4em}
.eb-actions{display:flex;gap:.5rem;margin-top:.5rem}
.eb-submit{border:0;background:var(--jade-dark);color:#fff;border-radius:6px;padding:.4rem 1.1rem;font-size:.9rem;font-weight:600;cursor:pointer}
.eb-submit:hover{background:var(--jade)}
.eb-cancel{border:1px solid var(--line);background:#fff8ec;color:var(--ink-soft);border-radius:6px;padding:.4rem .9rem;font-size:.9rem;cursor:pointer}
.eb-cancel:hover{background:var(--paper-deep)}
.eblock.lv-ch{background:#fcf0e8;border-color:#e8c4ad}
.eblock.lv-ch .eb-text{font-size:1.35rem;font-weight:600;color:var(--cinnabar)}
.eblock.lv-sec{background:#fdf6e3}
.eblock.lv-sec .eb-text{font-size:1.15rem;font-weight:600}
.eblock.lv-quote{border-left:4px solid var(--gold-deep)}
.eblock.lv-quote .eb-text{color:#4a443c}
/* page-break block */
.eblock.lv-pb{background:#f4efe4;border-style:dashed;border-color:var(--ochre)}
.eblock.lv-pb .eb-text{cursor:default}
.pb-divider{display:flex;align-items:center;gap:.7rem;color:#a78b4e;font-size:.82rem;letter-spacing:.3em;padding:.15rem 0}
.pb-divider::before,.pb-divider::after{content:"";border-top:2px dashed #d8c79b;flex:1}

/* ---------- present deck (slideshow) ---------- */
#deck{position:fixed;inset:0;z-index:80;background:#14110d;display:flex;align-items:center;justify-content:center}
#deck.hidden{display:none}
.deck-stage{width:min(1180px,92vw);max-height:90vh;overflow:auto;background:#fff;border-radius:10px;
  padding:clamp(2rem,5vw,4.5rem) clamp(1.6rem,5vw,5rem);box-shadow:0 24px 80px rgba(0,0,0,.55)}
.deck-slide .ch-head{margin-top:.4rem}
.deck-slide .unit:first-child,.deck-slide .sec-head:first-child{margin-top:0}
.deck-nav{position:fixed;top:0;bottom:0;width:14vw;min-width:64px;border:0;background:transparent;
  color:rgba(255,255,255,.0);font-size:3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:.2s}
.deck-prev{left:0} .deck-next{right:0}
.deck-nav:hover{color:rgba(255,255,255,.55)}
.deck-nav[disabled]{cursor:default;color:transparent!important}
.deck-bar{position:fixed;right:1.3rem;bottom:1.1rem;z-index:3;display:flex;align-items:center;gap:1rem}
.deck-page{font-variant-numeric:tabular-nums;font-size:.95rem;color:#d8d2c4;letter-spacing:.05em}
.deck-ctl{border:0;background:rgba(255,255,255,.14);color:#fff;width:40px;height:40px;border-radius:50%;
  cursor:pointer;font-size:1.1rem;display:grid;place-items:center}
.deck-ctl:hover{background:rgba(255,255,255,.28)}
.deck-ctl:disabled{opacity:.3;cursor:default}
#deckBarPrev,#deckBarNext{font-size:1.5rem;line-height:1}
/* annotation slide */
.deck-anno{max-width:900px;margin:0 auto}
.deck-anno .quote-of{color:var(--ink-soft);border-left:3px solid var(--ochre);padding-left:.9rem;
  margin-bottom:1.4rem;font-size:1.3rem;line-height:1.7}
.deck-anno .note{white-space:pre-wrap;font-size:1.45rem;line-height:1.95}
.deck-anno .note-title{font-weight:700;font-size:2.1rem;line-height:1.55}
.deck-anno img{display:block;max-width:100%;max-height:62vh;margin:1.2rem auto;border-radius:8px;border:1px solid var(--line)}
.deck-anno .embed{position:relative;width:100%;aspect-ratio:16/9;margin:1.2rem auto;border-radius:8px;overflow:hidden;background:#000}
.deck-anno .embed iframe,.deck-anno .embed video{position:absolute;inset:0;width:100%;height:100%;border:0}

/* compress an image file to a base64 data URL (no Storage needed) */
function compressImage(file, maxDim=1280, quality=0.8){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>maxDim||h>maxDim){const r=Math.min(maxDim/w,maxDim/h);w=Math.round(w*r);h=Math.round(h*r);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      resolve(cv.toDataURL('image/jpeg',quality));
    };
    img.onerror=reject;
    const fr=new FileReader();fr.onload=()=>img.src=fr.result;fr.onerror=reject;fr.readAsDataURL(file);
  });
}

/* ---------- state ---------- */

/* ---------- mode ---------- */
function setMode(on){
  if(on && isMobile()){alert('編輯模式請在電腦上使用，手機僅供瀏覽。');return;}
  editMode=on;
  $('#btnBrowse').classList.toggle('seg-on',!on);

/* ---------- cloud content (blocks) ---------- */
let BLOCKS={};            // key -> {order, level, text}
let booted=false;
const isMobile=()=>window.innerWidth<=760;
let dragKey=null;

function sortedBlocks(){
  return Object.entries(BLOCKS).map(([key,b])=>({key,...b})).sort((a,b)=>(a.order||0)-(b.order||0));
}
function deriveData(){
  const chapters=[]; let ch=null,sec=null;
  for(const b of sortedBlocks()){
    if(b.level==='換頁') continue;            // page breaks: ignored for reading
    if(b.level==='章'){ch={id:b.key,title:b.text,sections:[]};chapters.push(ch);sec=null;}
    else if(b.level==='節'){if(!ch){ch={id:'_pre',title:'',sections:[]};chapters.push(ch);}sec={id:b.key,title:b.text,units:[]};ch.sections.push(sec);}
    else{if(!ch){ch={id:'_pre',title:'',sections:[]};chapters.push(ch);}if(!sec){sec={id:ch.id+'_s',title:'',units:[]};ch.sections.push(sec);}
      sec.units.push({id:b.key,text:b.text,kind:b.level==='引用'?'quote':'prose'});}
  }
  DATA.chapters=chapters;
}
function onContentChange(){
  deriveData(); buildCover(); buildSidebar();
  if(!booted){
    booted=true;
    window.addEventListener('hashchange',()=>{ if(editMode) editHashChange(); else route(); });
    if(sessionStorage.getItem('zy_edit')==='1' && FIREBASE_ON && !isMobile()) setMode(true);

}

/* ---------- sidebar ---------- */
function buildSidebar(){
  const sb=$('#sidebar'); sb.innerHTML='';

/* ---------- routing ---------- */
function route(){
  const h=location.hash.replace(/^#\//,'');
  if(h.startsWith('front/')){ showReader(); renderFront(h.split('/')[1]); return; }
  if(h.startsWith('chapter/')){
    const id=h.split('/')[1].split('#')[0];

    const anchor=location.hash.split('#')[2];
    if(anchor){const t=document.getElementById(anchor);if(t)t.scrollIntoView({behavior:'smooth'});}
    return;
  }
  showCover();
}

/* ---------- render front matter ---------- */
function renderFront(which){
  currentChapterId=null; markSidebar();
  const c=$('#content'); c.innerHTML='';
  if(which==='motto'){

    const u=el('div','unit quote'); u.dataset.unit='front-preface';
    u.innerHTML=renderText('front-preface',pf.text); c.append(u);
    c.append(el('p','unit',`<div style="text-align:right;color:var(--ink-soft)">${esc(pf.sign)}</div>`));
  }

/* ---------- render chapter ---------- */
function renderChapter(id){
  const ch=DATA.chapters.find(c=>c.id===id); if(!ch){showCover();return;}
  currentChapterId=id; markSidebar(); setTopTitle(ch.title);
  const parts=ch.title.split('、');
  const c=$('#content'); c.innerHTML='';
  c.append(el('div','ch-head',`<div class="seal-num">${esc(parts[0])}</div><h2>${esc(parts.slice(1).join('、'))}</h2>`));
  ch.sections.forEach(s=>{
    if(s.title){
      const sh=el('div','sec-head',`<h3>${esc(s.title)}</h3>`);
      sh.id=s.id; c.append(sh);
    }
    s.units.forEach(u=>{
      const d=el('div','unit '+(u.kind==='quote'?'quote':'prose'));
      d.dataset.unit=u.id; d.innerHTML=renderText(u.id,u.text); c.append(d);
    });
  });
  window.scrollTo(0,0);
}

/* ---------- text + annotation rendering ---------- */
function renderText(rowId,text){
  const anns=(annByRow[rowId]||[]).slice().sort((a,b)=>a.startOffset-b.startOffset);
  let out='',i=0,k=0;
  const push=(seg)=>{out+=esc(seg).replace(/\n/g,'<br>');};
  while(i<text.length){
    const a=anns[k];
    if(a && i===a.startOffset && a.endOffset>a.startOffset){
      out+=`<mark class="anno" data-key="${a._key}">`;
      push(text.slice(a.startOffset,a.endOffset));
      out+='</mark>';
      i=a.endOffset; k++;
      while(anns[k] && anns[k].startOffset<i) k++;   // skip overlaps
    }else{
      let next=text.length;
      for(let j=k;j<anns.length;j++){if(anns[j].startOffset>=i){next=anns[j].startOffset;break;}}
      push(text.slice(i,next)); i=next;
    }
  }
  return out;
}

/* ---------- compute char offset within a unit ---------- */
function offsetOf(root,node,off){
  let acc=0,done=false,res=0;
  (function walk(n){
    if(done)return;
    if(n===node && n.nodeType===3){res=acc+off;done=true;return;}
    if(n.nodeType===3){acc+=n.nodeValue.length;return;}
    if(n.nodeName==='BR'){acc+=1;}
    if(n===node && n.nodeType===1){ // selection endpoint at element level
      for(let j=0;j<off;j++) walk(n.childNodes[j]);
      res=acc;done=true;return;
    }
    for(const c of n.childNodes){walk(c);if(done)return;}
  })(root);
  return done?res:acc;
}

/* ---------- selection -> add annotation ---------- */
const selBtn=$('#sel-btn');
function hideSelBtn(){selBtn.style.display='none';pendingSel=null;}
document.addEventListener('mouseup',e=>{
  if(!editMode)return;
  if(e.target===selBtn)return;
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel || sel.isCollapsed || !sel.rangeCount){hideSelBtn();return;}
    const unit=sel.anchorNode.parentElement?.closest('[data-unit]');
    const unit2=sel.focusNode.parentElement?.closest('[data-unit]');
    if(!unit || unit!==unit2){hideSelBtn();return;}
    let s=offsetOf(unit,sel.anchorNode,sel.anchorOffset);
    let en=offsetOf(unit,sel.focusNode,sel.focusOffset);
    if(s>en)[s,en]=[en,s];
    if(en-s<1){hideSelBtn();return;}
    const txt=unitText(unit.dataset.unit).slice(s,en);
    pendingSel={rowId:unit.dataset.unit,start:s,end:en,text:txt};
    const r=sel.getRangeAt(0).getBoundingClientRect();
    selBtn.style.display='block';
    selBtn.style.left=(window.scrollX+r.left+r.width/2-40)+'px';
    selBtn.style.top=(window.scrollY+r.top-44)+'px';
  },10);
});
selBtn.onclick=()=>{ if(pendingSel){editingKey=null;openModal(pendingSel);} };

function unitText(rowId){
  if(rowId==='front-preface')return DATA.frontMatter?.preface?.text||'';
  if(BLOCKS[rowId])return BLOCKS[rowId].text;
  for(const ch of DATA.chapters)for(const s of ch.sections)for(const u of s.units)
    if(u.id===rowId)return u.text;
  return '';
}

/* ---------- view panel ---------- */
function embedHTML(url){
  url=(url||'').trim(); if(!url) return '';
  let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([\w-]{11})/);
  if(m) return `<div class="embed"><iframe src="https://www.youtube.com/embed/${m[1]}" allowfullscreen frameborder="0"></iframe></div>`;
  m=url.match(/vimeo\.com\/(\d+)/);
  if(m) return `<div class="embed"><iframe src="https://player.vimeo.com/video/${m[1]}" allowfullscreen frameborder="0"></iframe></div>`;
  if(/\.(mp4|webm|ogg)(\?|#|$)/i.test(url)) return `<div class="embed"><video src="${esc(url)}" controls></video></div>`;
  return `<a class="lk" href="${esc(url)}" target="_blank" rel="noopener">▶ ${esc(url)}</a>`;
}
function openPanel(ann){
  const b=$('#panelBody');
  const align=ann.noteAlign||'left';
  const noteCls=ann.noteStyle==='title'?'note note-title':'note';
  let html=`<div class="quote-of">「${esc(ann.selectedText)}」</div>`;
  (ann.videos||[]).forEach(v=>html+=embedHTML(v.url));
  (ann.images||[]).forEach(im=>html+=`<img src="${esc(im.url)}" alt="">`);
  if(ann.note) html+=`<div class="${noteCls}" style="text-align:${align}">${esc(ann.note)}</div>`;
  (ann.links||[]).forEach(lk=>html+=`<a class="lk" href="${esc(lk.url)}" target="_blank" rel="noopener">🔗 ${esc(lk.label||lk.url)}</a>`);
  b.innerHTML=html; $('#panel').classList.add('open');
}

/* ============ EDIT MODE: block editor ============ */
const LV_CLASS={'章':'ch','節':'sec','內文':'prose','引用':'quote','換頁':'pb'};
const LEVELS=['章','節','內文','引用','換頁'];
let pendingEditKey=null;
/* chapter scoping — edit one chapter at a time */
function chapterList(){return sortedBlocks().filter(b=>b.level==='章').map(b=>({id:b.key,title:b.text}));}
function blocksForChapter(cid){
  const out=[]; let cur=null;
  for(const b of sortedBlocks()){
    if(b.level==='章') cur=b.key;
    if(cur===cid) out.push(b);
  }
  return out;
}
/* split a chapter into content pages (segments) by 換頁 markers */
function chapterSegments(cid){
  const segs=[]; let cur=[];
  for(const b of blocksForChapter(cid)){
    if(b.level==='換頁'){ if(cur.length){segs.push(cur);cur=[];} }
    else cur.push(b);
  }
  if(cur.length) segs.push(cur);
  return segs;
}
/* editor body: page-break shows a divider, otherwise the (annotated) text */
function blockBodyHTML(b){
  if(b.level==='換頁') return '<div class="pb-divider">✂ 換頁</div>';
  return renderText(b.key,b.text)||'<span class="eb-empty">（空白，點 ✎ 鉛筆圖示輸入）</span>';
}
async function saveBlock(key,patch){Object.assign(BLOCKS[key],patch);patch.updatedAt=Date.now();await update(ref(db,'content/blocks/'+key),patch);}
async function addBlockAfter(key){
  const list=sortedBlocks(); const i=list.findIndex(b=>b.key===key);
  const cur=list[i].order||(i+1)*10; const nxt=list[i+1]?list[i+1].order:cur+20;
  const order=(cur+nxt)/2;
  const nk='b'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);
  const rec={order,level:'內文',text:'',updatedAt:Date.now()};
  BLOCKS[nk]=rec; pendingEditKey=nk; syncEditList();          // instant
  await set(ref(db,'content/blocks/'+nk),rec);
}
async function delBlock(key){
  if(!confirm('確定刪除此區塊？'))return;
  delete BLOCKS[key]; syncEditList();                          // instant
  await remove(ref(db,'content/blocks/'+key));
}
async function moveBlock(dragK,targetK,after){
  const list=sortedBlocks().filter(b=>b.key!==dragK);
  const ti=list.findIndex(b=>b.key===targetK);
  const prev= after?list[ti]:list[ti-1];
  const next= after?list[ti+1]:list[ti];
  const po=prev?prev.order:(next.order-20);
  const no=next?next.order:(prev.order+20);
  const order=(po+no)/2;
  BLOCKS[dragK].order=order; syncEditList();                  // instant
  await update(ref(db,'content/blocks/'+dragK),{order,updatedAt:Date.now()});
}

/* in-place reconcile: update only what changed, keep scroll + focus */
function syncEditList(){
  const c=$('#content');
  const toolbar=c.querySelector('.edit-toolbar');
  if(!toolbar){ renderEditList(); return; }
  const existing={}; c.querySelectorAll('.eblock').forEach(card=>existing[card.dataset.key]=card);
  let prev=toolbar;
  for(const b of blocksForChapter(editChapterId)){
    let card=existing[b.key];
    if(card){ delete existing[b.key]; updateCard(card,b); }
    else{
      card=blockCard(b);
      if(b.key===pendingEditKey){ pendingEditKey=null; setTimeout(()=>{
        const r=card.getBoundingClientRect();
        if(r.top<60||r.bottom>window.innerHeight) card.scrollIntoView({block:'center'});
        startEdit(card,b.key);
      },0); }
    }
    if(prev.nextSibling!==card) c.insertBefore(card,prev.nextSibling);
    prev=card;
  }
  Object.values(existing).forEach(card=>card.remove());
}
function updateCard(card,b){
  const sel=card.querySelector('.eb-level');
  if(sel && sel.value!==b.level){ sel.value=b.level; card.className='eblock lv-'+(LV_CLASS[b.level]||'prose'); }
  const pen=card.querySelector('.eb-pencil'); if(pen) pen.style.display=(b.level==='換頁')?'none':'';
  const tx=card.querySelector('.eb-text'); if(!tx) return;
  // page-break always shows the divider (close any open editor); others skip while editing
  if(b.level!=='換頁' && tx.querySelector('textarea')) return;
  const html=blockBodyHTML(b);
  if(tx.innerHTML!==html) tx.innerHTML=html;
}

function renderEditList(){
  showReader();
  toggleSidebar(false);
  const chs=chapterList();
  if(!editChapterId || !chs.some(c=>c.id===editChapterId)) editChapterId=(chs[0]&&chs[0].id)||null;
  markSidebar();
  const idx=chs.findIndex(c=>c.id===editChapterId);
  const cur=chs[idx];
  setTopTitle(cur?cur.title:'');
  const c=$('#content'); c.innerHTML='';
  const bar=el('div','edit-toolbar');
  bar.innerHTML=`<span class="et-chap">✎ ${cur?esc(cur.title):'（無章節）'}</span>`;
  const organize=el('button','et-organize','🎞 簡報編排'); organize.onclick=openOrganizer; bar.append(organize);
  const nav=el('div','et-nav');
  const prev=el('button','et-navbtn','◂ 上一章'); prev.disabled=idx<=0;
  prev.onclick=()=>{ if(idx>0){editChapterId=chs[idx-1].id;renderEditList();} };
  const next=el('button','et-navbtn','下一章 ▸'); next.disabled=idx>=chs.length-1;
  next.onclick=()=>{ if(idx<chs.length-1){editChapterId=chs[idx+1].id;renderEditList();} };
  nav.append(prev,next); bar.append(nav);
  c.append(bar);
  blocksForChapter(editChapterId).forEach(b=>c.append(blockCard(b)));
  window.scrollTo(0,0);
}
function blockCard(b){
  const card=el('div','eblock lv-'+(LV_CLASS[b.level]||'prose')); card.dataset.key=b.key;
  const bar=el('div','eb-bar');
  const dh=el('span','eb-drag','⋮⋮'); dh.draggable=true; dh.title='拖曳排序';
  const sel=el('select','eb-level');
  LEVELS.forEach(l=>{const o=el('option',null,l);o.value=l;if(l===b.level)o.selected=true;sel.append(o);});
  sel.onchange=()=>saveBlock(b.key,{level:sel.value}).then(()=>{card.className='eblock lv-'+(LV_CLASS[sel.value]||'prose');});
  const edit=el('button','eb-ico eb-pencil','<svg viewBox="0 0 24 24"><path d="M4 20h4L18.5 9.5a2.1 2.1 0 0 0-3-3L5 17v3z"/><path d="M13.5 6.5l3 3"/></svg>');
  edit.title='改字'; edit.onclick=()=>startEdit(card,b.key); if(b.level==='換頁') edit.style.display='none';
  const add=el('button','eb-ico','<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>');
  add.title='在下方新增區塊'; add.onclick=()=>addBlockAfter(b.key);
  const del=el('button','eb-ico eb-del','<svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M9 7V5h6v2"/><path d="M6 7l1 13h10l1-13"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>');
  del.title='刪除'; del.onclick=()=>delBlock(b.key);
  bar.append(dh,sel,edit,add,del);
  const tx=el('div','eb-text'); tx.dataset.unit=b.key; tx.innerHTML=blockBodyHTML(b);
  card.append(bar,tx);
  dh.addEventListener('dragstart',e=>{dragKey=b.key;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text','');});
  dh.addEventListener('dragend',()=>card.classList.remove('dragging'));
  card.addEventListener('dragover',e=>{if(!dragKey||dragKey===b.key)return;e.preventDefault();
    const after=e.offsetY>card.offsetHeight/2; card.classList.toggle('drop-after',after); card.classList.toggle('drop-before',!after);});
  card.addEventListener('dragleave',()=>card.classList.remove('drop-after','drop-before'));
  card.addEventListener('drop',e=>{e.preventDefault();const after=card.classList.contains('drop-after');card.classList.remove('drop-after','drop-before');
    if(dragKey&&dragKey!==b.key)moveBlock(dragKey,b.key,after);dragKey=null;});
  return card;
}
function closeEditor(card,key,val){
  const tx=card.querySelector('.eb-text');
  tx.innerHTML=renderText(key,val)||'<span class="eb-empty">（空白，點 ✎ 鉛筆圖示輸入）</span>';
}
function commitOpenEditors(){
  document.querySelectorAll('.eblock .eb-text textarea').forEach(ta=>{
    const card=ta.closest('.eblock'); const key=card.dataset.key; const v=ta.value;
    if(v!==(BLOCKS[key].text||'')) saveBlock(key,{text:v});
    closeEditor(card,key,v);
  });
}
function startEdit(card,key){
  const tx=card.querySelector('.eb-text'); if(tx.querySelector('textarea'))return;
  commitOpenEditors();                       // only one editor open at a time
  const cur=BLOCKS[key].text||'';
  tx.innerHTML='';
  const ta=el('textarea','eb-edit'); ta.value=cur;
  const actions=el('div','eb-actions');
  const ok=el('button','eb-submit','✓ 送出');
  const cancel=el('button','eb-cancel','取消');
  actions.append(ok,cancel);
  tx.append(ta,actions);
  const grow=()=>{ta.style.height='auto';ta.style.height=(ta.scrollHeight+4)+'px';};
  ta.focus(); grow(); ta.oninput=grow;
  ok.onclick=async()=>{ const v=ta.value; if(v!==cur) await saveBlock(key,{text:v}); closeEditor(card,key,v); };
  cancel.onclick=()=>closeEditor(card,key,cur);
  ta.onkeydown=e=>{
    if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();ok.click();}
    if(e.key==='Escape'){e.preventDefault();cancel.click();}
  };
}

/* ============ DECK MODEL (shared by playback + organizer) ============ */
let DECKS={};             // chapterKey -> { items: { id: {order,kind,ref|annKey,hidden} } }
function sortedDeckItems(cid){
  const node=(DECKS[cid]&&DECKS[cid].items)||{};
  return Object.entries(node).map(([id,v])=>({id,...v})).sort((a,b)=>(a.order||0)-(b.order||0));
}
function chapterAnnotations(cid){
  const keys=new Set(blocksForChapter(cid).map(b=>b.key));
  return Object.values(annAll).filter(a=>keys.has(a.rowId));
}
/* reconcile stored deck with current content segments + annotations */
function effectiveDeck(cid){
  const segs=chapterSegments(cid);
  const segIds=segs.map(s=>s[0].key);
  const segById={}; segs.forEach(s=>segById[s[0].key]=s);
  const stored=sortedDeckItems(cid);
  const result=[]; const usedSeg=new Set(), usedAnno=new Set();
  for(const it of stored){
    if(it.kind==='content'){ if(segById[it.ref]&&!usedSeg.has(it.ref)){result.push({id:it.id,kind:'content',ref:it.ref,hidden:!!it.hidden});usedSeg.add(it.ref);} }
    else if(it.kind==='anno'){ if(annAll[it.annKey]&&!usedAnno.has(it.annKey)){result.push({id:it.id,kind:'anno',annKey:it.annKey});usedAnno.add(it.annKey);} }
  }
  segIds.forEach((sid,idx)=>{
    if(usedSeg.has(sid))return;
    let at=result.length;
    if(idx===0) at=0;
    else for(let j=idx-1;j>=0;j--){ const p=result.findIndex(r=>r.kind==='content'&&r.ref===segIds[j]); if(p>=0){at=p+1;break;} }
    result.splice(at,0,{id:null,kind:'content',ref:sid,hidden:false,_auto:true});
  });
  return {result,segById};
}

/* ============ PRESENT MODE: slideshow playback ============ */
let DECK=null;            // {slides:[{kind,seg|ann},...], i:number}
function renderSlide(seg){
  const wrap=el('div','deck-slide');
  seg.forEach(b=>{
    if(b.level==='章'){const parts=(b.text||'').split('、');
      wrap.append(el('div','ch-head',`<div class="seal-num">${esc(parts[0]||'')}</div><h2>${esc(parts.slice(1).join('、'))}</h2>`));}
    else if(b.level==='節'){wrap.append(el('div','sec-head',`<h3>${esc(b.text)}</h3>`));}
    else{const d=el('div','unit '+(b.level==='引用'?'quote':'prose'));
      d.innerHTML=esc(b.text||'').replace(/\n/g,'<br>'); wrap.append(d);}
  });
  return wrap;
}
function renderAnnoSlide(ann){
  const wrap=el('div','deck-slide deck-anno');
  const align=ann.noteAlign||'left';
  const noteCls=ann.noteStyle==='title'?'note note-title':'note';
  let html=`<div class="quote-of">「${esc(ann.selectedText)}」</div>`;
  (ann.videos||[]).forEach(v=>html+=embedHTML(v.url));
  (ann.images||[]).forEach(im=>html+=`<img src="${esc(im.url)}" alt="">`);
  if(ann.note) html+=`<div class="${noteCls}" style="text-align:${align}">${esc(ann.note)}</div>`;
  (ann.links||[]).forEach(lk=>html+=`<a class="lk" href="${esc(lk.url)}" target="_blank" rel="noopener">🔗 ${esc(lk.label||lk.url)}</a>`);
  wrap.innerHTML=html;
  return wrap;
}
function buildDeckSlides(cid){
  const {result,segById}=effectiveDeck(cid);
  const slides=[];
  for(const it of result){
    if(it.kind==='content'){ if(it.hidden)continue; const seg=segById[it.ref]; if(seg&&seg.length) slides.push({kind:'content',seg}); }
    else if(it.kind==='anno'){ const a=annAll[it.annKey]; if(a) slides.push({kind:'anno',ann:a}); }
  }
  return slides;
}
function showSlide(i){
  if(!DECK)return;
  DECK.i=Math.max(0,Math.min(DECK.slides.length-1,i));
  const s=DECK.slides[DECK.i];
  const node=s.kind==='anno'?renderAnnoSlide(s.ann):renderSlide(s.seg);
  const st=$('#deckStage'); st.innerHTML=''; st.append(node); st.scrollTop=0;
  $('#deckPage').textContent=(DECK.i+1)+' / '+DECK.slides.length;
  const atStart=DECK.i<=0, atEnd=DECK.i>=DECK.slides.length-1;
  $('#deckPrev').disabled=atStart; $('#deckBarPrev').disabled=atStart;
  $('#deckNext').disabled=atEnd;   $('#deckBarNext').disabled=atEnd;
}
function openDeck(cid){
  if(!cid){alert('請先進入一個章節，再按展示。');return;}
  const slides=buildDeckSlides(cid);
  if(!slides.length){alert('此章節沒有可展示的內容。');return;}
  DECK={slides,i:0};
  $('#deck').classList.remove('hidden');
  $('#presentBtn').classList.add('on');
  document.addEventListener('keydown',deckKey);
  showSlide(0);
}
function closeDeck(){
  DECK=null;
  $('#deck').classList.add('hidden');
  $('#presentBtn').classList.remove('on');
  document.removeEventListener('keydown',deckKey);
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
}
function deckKey(e){
  if(e.key==='ArrowRight'||e.key==='PageDown'){e.preventDefault();showSlide(DECK.i+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();showSlide(DECK.i-1);}
  else if(e.key==='Escape'){e.preventDefault();closeDeck();}
}
$('#deckPrev').onclick=()=>showSlide(DECK.i-1);
$('#deckNext').onclick=()=>showSlide(DECK.i+1);
$('#deckBarPrev').onclick=()=>showSlide(DECK.i-1);
$('#deckBarNext').onclick=()=>showSlide(DECK.i+1);
$('#deckClose').onclick=closeDeck;
$('#deckFs').onclick=()=>{ const d=$('#deck');
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  else if(d.requestFullscreen) d.requestFullscreen().catch(()=>{}); };

/* ============ PRESENT ORGANIZER (簡報編排) ============ */
let ORG=null, orgCid=null, orgDrag=null;
function firstLine(seg){
  for(const b of seg){ const t=(b.text||'').trim(); if(t) return t.split('\n')[0]; }
  return '（空白頁）';
}
async function saveDeck(){
  const map={};
  ORG.forEach((it,idx)=>{
    if(!it.id){ it.id='d'+Date.now().toString(36)+idx.toString(36)+Math.floor(Math.random()*1e4).toString(36); it._auto=false; }
    map[it.id]={order:idx*10,kind:it.kind};
    if(it.kind==='content'){ map[it.id].ref=it.ref; if(it.hidden) map[it.id].hidden=true; }
    else map[it.id].annKey=it.annKey;
  });
  await set(ref(db,'content/decks/'+orgCid+'/items'),map);
}
function openOrganizer(){
  if(!editChapterId){alert('請先選擇章節。');return;}
  orgCid=editChapterId;
  ORG=effectiveDeck(orgCid).result;
  $('#orgTitle').textContent='簡報編排 · '+(chapterList().find(c=>c.id===orgCid)?.title||'');
  $('#organizer').classList.remove('hidden');
  renderOrganizer();
}
function closeOrganizer(){ $('#organizer').classList.add('hidden'); ORG=null; }
function renderOrganizer(){
  const {segById}=effectiveDeck(orgCid);
  const list=$('#orgList'); list.innerHTML='';
  let visN=0;
  ORG.forEach((it,idx)=>{
    const row=el('div','org-item'+(it.kind==='content'&&it.hidden?' hidden-slide':'')); row.dataset.idx=idx;
    const dh=el('span','org-drag','⋮⋮'); dh.draggable=true;
    const isAnno=it.kind==='anno';
    const badge=el('span','org-badge '+(isAnno?'b-anno':'b-content'), isAnno?'註解':'內文');
    let prevTxt;
    if(isAnno){ const a=annAll[it.annKey]; prevTxt='「'+(a?a.selectedText:'？')+'」'+(a&&a.note?' — '+a.note.slice(0,18):''); }
    else { const seg=segById[it.ref]; prevTxt=seg?firstLine(seg):'（內容已移除）'; }
    if(!(it.kind==='content'&&it.hidden)) visN++;
    const num=el('span','org-num', (it.kind==='content'&&it.hidden)?'—':String(visN));
    const prev=el('span','org-prev',esc(prevTxt));
    row.append(dh,num,badge,prev);
    if(it.kind==='content'){
      const eye=el('button','org-act', it.hidden?'顯示':'隱藏');
      eye.onclick=async()=>{ it.hidden=!it.hidden; await saveDeck(); renderOrganizer(); };
      row.append(eye);
    }else{
      const rm=el('button','org-act','移除');
      rm.onclick=async()=>{ ORG.splice(idx,1); await saveDeck(); renderOrganizer(); };
      row.append(rm);
    }
    // drag reorder
    dh.addEventListener('dragstart',e=>{orgDrag=idx;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text','');});
    dh.addEventListener('dragend',()=>row.classList.remove('dragging'));
    row.addEventListener('dragover',e=>{if(orgDrag===null||orgDrag===idx)return;e.preventDefault();
      const after=e.offsetY>row.offsetHeight/2; row.classList.toggle('drop-after',after); row.classList.toggle('drop-before',!after);});
    row.addEventListener('dragleave',()=>row.classList.remove('drop-after','drop-before'));
    row.addEventListener('drop',async e=>{e.preventDefault();const after=row.classList.contains('drop-after');row.classList.remove('drop-after','drop-before');
      if(orgDrag!==null&&orgDrag!==idx){ let to=idx+(after?1:0); const moved=ORG.splice(orgDrag,1)[0]; if(orgDrag<to)to--; ORG.splice(to,0,moved); await saveDeck(); renderOrganizer(); }
      orgDrag=null;});
    list.append(row);
  });
  // annotation pool (not yet in deck)
  const inDeck=new Set(ORG.filter(i=>i.kind==='anno').map(i=>i.annKey));
  const pool=$('#orgPool'); pool.innerHTML='';
  const anns=chapterAnnotations(orgCid).filter(a=>!inDeck.has(a._key));
  if(!anns.length){ pool.append(el('div','org-empty','（本章註解都已加入，或尚無註解）')); }
  anns.forEach(a=>{
    const row=el('div','org-add');
    row.append(el('span','org-badge b-anno','註解'));
    row.append(el('span','org-prev',esc('「'+a.selectedText+'」'+(a.note?' — '+a.note.slice(0,18):''))));
    const add=el('button','org-addbtn','加入簡報');
    add.onclick=async()=>{ ORG.push({id:null,kind:'anno',annKey:a._key}); await saveDeck(); renderOrganizer(); };
    row.append(add); pool.append(row);
  });
}
$('#orgClose').onclick=closeOrganizer;
$('#organizer').onclick=e=>{ if(e.target.id==='organizer') closeOrganizer(); };

boot();
</script>
