<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智勇人才班教材</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --jade:#6E9C8A; --jade-dark:#4F7A69; --paper:#F4ECDA; --paper-deep:#EADFC6;
  --ochre:#C8A063; --cinnabar:#DC2B39; --ink:#2B2724; --ink-soft:#5A534B;
  --reading-scale:1;
  --line:#d8cba8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Noto Serif TC",serif; color:var(--ink);
  background:var(--paper);
  background-image:
    linear-gradient(rgba(244,236,218,.86), rgba(244,236,218,.86)),
    url("assets/paper-texture.jpg");
  background-size:auto, 760px;
  line-height:1.95;
}
/* fixed ink-wash backdrop, visible behind the whole site */
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:url("assets/cover-bg.jpg") center bottom / cover no-repeat;opacity:.28}
.brush{font-family:"Noto Serif TC",serif;font-weight:900}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer}
a{color:var(--jade-dark)}

/* ---------- top bar ---------- */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:.6rem;
  padding:.5rem .9rem;background:rgba(244,236,218,.92);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line)}
body.on-cover .topbar{display:none}
.topbar .home{font-family:"Noto Serif TC",serif;font-weight:900;font-size:1.4rem;color:var(--cinnabar);
  text-decoration:none;display:flex;align-items:center;gap:.4rem}
.topbar .spacer{flex:1}
.seal-img{width:32px;height:32px;object-fit:contain;display:block}

/* font-size control (slider) */
.fsctl{display:flex;align-items:center;gap:.5rem;border:1px solid var(--line);border-radius:999px;background:#fff8ec;padding:.3rem .85rem}
.fsctl .a-end{color:var(--ink-soft);font-weight:700;line-height:1;font-family:"Noto Serif TC",serif}
.fsctl .a-sm{font-size:.8rem}.fsctl .a-lg{font-size:1.3rem}
.fsctl input[type=range]{-webkit-appearance:none;appearance:none;width:108px;height:5px;border-radius:3px;
  background:linear-gradient(90deg,var(--jade),var(--ochre));outline:none;cursor:pointer}
.fsctl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--cinnabar);border:2px solid #fff8ec;box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:pointer}
.fsctl input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;
  background:var(--cinnabar);border:2px solid #fff8ec;cursor:pointer}

/* mode toggle */
.mode{display:flex;align-items:center;gap:.45rem;border:1px solid var(--line);
  border-radius:999px;padding:.25rem .55rem;background:#fff8ec;font-size:.9rem}
.mode .dot{width:10px;height:10px;border-radius:50%;background:var(--jade)}
.mode.edit .dot{background:var(--cinnabar)}
.mode button{border:0;background:var(--jade);color:#fff;border-radius:999px;padding:.3rem .8rem;font-size:.85rem}
.mode.edit button{background:var(--cinnabar)}

/* ---------- cover ---------- */
#cover{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3.4rem 1.2rem 4rem;text-align:center;position:relative;overflow:hidden;
  background:#13161a url("assets/cover-shanshui.jpg") center center / cover no-repeat;
  background-attachment:fixed;color:#EDE3CC}
#cover .scroll-bg{display:block;position:absolute;inset:0;z-index:0;
  background:linear-gradient(180deg, rgba(14,16,20,.55) 0%, rgba(14,16,20,.32) 38%, rgba(14,16,20,.82) 100%)}
#cover .inner{position:relative;z-index:1;width:100%;max-width:980px}
#cover .logo{width:300px;max-width:64vw;margin:0 auto .4rem;display:block;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,.45))}
#cover h1{font-family:"Noto Serif TC",serif;font-weight:500;font-size:clamp(1.4rem,3.4vw,2rem);
  letter-spacing:.55rem;color:#EDE3CC;margin:.2rem 0 .2rem;text-indent:.55rem}
#cover .sub{color:var(--ochre);letter-spacing:.4rem;font-size:.82rem;margin-bottom:2.6rem;opacity:.85}
.frontrow{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin:0 auto 2.6rem}
.frontrow .fcard{border:1px solid rgba(237,227,204,.22);border-radius:10px;background:rgba(255,255,255,.04);
  padding:.7rem 1.6rem;font-size:1.02rem;color:#EDE3CC;text-decoration:none;
  display:flex;align-items:center;gap:.55rem;transition:.18s}
.frontrow .fcard:hover{background:rgba(110,156,138,.22);border-color:var(--jade)}
.frontrow .fcard .mk{color:var(--ochre);font-size:.95rem}

.toc-title{display:flex;align-items:center;gap:1rem;margin:1.6rem 0 1.2rem;color:rgba(237,227,204,.65);
  letter-spacing:.4rem;font-size:.9rem}
.toc-title::before,.toc-title::after{content:"";height:1px;background:rgba(237,227,204,.22);flex:1}
.chaptergrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:.7rem;text-align:left}
.chcard{display:flex;align-items:center;gap:.9rem;border:1px solid rgba(237,227,204,.13);border-radius:8px;
  background:rgba(255,255,255,.03);padding:.7rem 1.1rem;text-decoration:none;color:#EDE3CC;transition:.18s}
.chcard:hover{border-color:var(--ochre);background:rgba(200,160,99,.12)}
.chcard .num{font-size:.98rem;color:var(--ochre);min-width:2rem;text-align:center;letter-spacing:.04rem;
  border-right:1px solid rgba(237,227,204,.18);padding-right:.75rem}
.chcard .nm{font-size:1.02rem;font-weight:500;letter-spacing:.02rem}

/* ---------- reader ---------- */
#reader{display:grid;grid-template-columns:260px 1fr;min-height:100vh;transition:grid-template-columns .2s}
#reader.nav-collapsed{grid-template-columns:1fr}
#reader.nav-collapsed #sidebar{display:none}
#sidebar{border-right:1px solid var(--line);background:rgba(234,223,198,.5);
  padding:1rem .6rem 3rem;position:sticky;top:50px;align-self:start;max-height:calc(100vh - 50px);overflow:auto}
#sidebar .sb-home{display:block;font-family:"Noto Serif TC",serif;font-weight:900;color:var(--cinnabar);
  font-size:1.2rem;text-decoration:none;margin:.2rem .4rem 1rem}
.sb-ch{margin-bottom:.15rem}
.sb-ch>a{display:block;padding:.45rem .55rem;border-radius:7px;text-decoration:none;color:var(--ink);font-weight:500}
.sb-ch>a:hover{background:var(--paper-deep)}
.sb-ch.active>a{background:var(--jade);color:#fff}
.sb-secs{margin:.1rem 0 .5rem .8rem;border-left:2px solid var(--line);padding-left:.3rem}
.sb-secs a{display:block;padding:.28rem .5rem;font-size:.92rem;color:var(--ink-soft);text-decoration:none;border-radius:6px}
.sb-secs a:hover{background:var(--paper-deep);color:var(--ink)}

#content{padding:2.2rem clamp(1rem,5vw,4rem) 6rem;max-width:880px;margin:0 auto;width:100%}
.present-btn{border:1px solid var(--line);background:#fff8ec;border-radius:999px;padding:.35rem .85rem;color:var(--ink-soft);font-size:.9rem}
.present-btn:hover{background:var(--paper-deep)}
.present-btn.on{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar)}
body.present-mode #content{max-width:none;padding:2.2rem clamp(1.5rem,4vw,5rem) 5rem}
.ch-head{text-align:center;margin:1rem 0 2.4rem}
.ch-head .seal-num{font-family:"Noto Serif TC",serif;font-weight:900;font-size:2rem;color:var(--cinnabar)}
.ch-head h2{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(2rem,5vw,3rem);letter-spacing:.3rem;margin-top:.3rem}
.sec-head{display:flex;align-items:center;gap:.8rem;margin:2.4rem 0 1.1rem}
.sec-head .bar{width:6px;height:1.5em;background:var(--cinnabar);border-radius:3px}
.sec-head h3{font-size:calc(1.45rem * var(--reading-scale));font-weight:700;letter-spacing:.1rem}

.unit{font-size:calc(1.16rem * var(--reading-scale));margin:1rem 0;text-align:justify}
.unit.prose{text-indent:2em}
.unit.quote{position:relative;border-left:3px solid var(--jade);padding:.2rem 0 .2rem 1.3rem;
  text-indent:0;font-size:calc(1.08rem * var(--reading-scale));color:#4a443c}

.motto-line{text-align:center;font-weight:700;letter-spacing:.35rem;
  font-size:calc(1.9rem * var(--reading-scale));margin:1.1rem 0;color:var(--ink)}

mark.anno{background:rgba(178,58,46,.16);border-bottom:2px solid var(--cinnabar);
  border-radius:2px;cursor:pointer;padding:0 1px}
mark.anno:hover{background:rgba(178,58,46,.28)}

/* selection floating button */
#sel-btn{position:absolute;z-index:50;display:none;background:var(--cinnabar);color:#fff;border:0;
  border-radius:999px;padding:.4rem .9rem;font-size:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.25)}

/* side panel (view annotation) */
#panel{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(26,25,22,.55);backdrop-filter:blur(2px);padding:1rem}
#panel.open{display:flex}
#panel .pcard{position:relative;background:var(--paper);border:1px solid var(--line);border-radius:14px;
  width:96vw;max-width:1180px;height:92vh;overflow:auto;padding:2.4rem clamp(1.4rem,4vw,3.2rem) 2.6rem;
  box-shadow:0 20px 60px rgba(0,0,0,.45)}
#panel h4{font-family:"Noto Serif TC",serif;font-weight:900;color:var(--cinnabar);font-size:1.3rem;margin-bottom:.3rem}
#panel .quote-of{color:var(--ink-soft);border-left:3px solid var(--ochre);padding-left:.7rem;
  margin:.2rem 0 1.2rem;font-size:calc(1.05rem * var(--reading-scale))}
#panel .note{white-space:pre-wrap;font-size:calc(1.15rem * var(--reading-scale));line-height:1.95;margin-bottom:1.2rem}
#panel img{display:block;max-width:100%;max-height:74vh;margin:1rem auto;border-radius:8px;border:1px solid var(--line)}
#panel .lk{display:block;margin:.35rem 0;padding:.5rem .7rem;background:var(--paper);border-radius:7px;text-decoration:none}
#panel .close{position:absolute;top:.7rem;right:.8rem;border:0;background:transparent;font-size:1.5rem;color:var(--ink-soft)}
#panel .edit-actions{display:flex;gap:.6rem;margin-top:1rem}
#panel .edit-actions button{flex:1;border:0;border-radius:8px;padding:.55rem;color:#fff}
#panel .btn-edit{background:var(--jade)} #panel .btn-del{background:var(--cinnabar)}

/* modal (edit annotation) */
#overlay{position:fixed;inset:0;background:rgba(43,39,36,.5);z-index:70;display:none;align-items:center;justify-content:center;padding:1rem}
#overlay.open{display:flex}
.modal{background:var(--paper);border-radius:14px;width:min(560px,96vw);max-height:92vh;overflow:auto;padding:1.4rem}
.modal h3{font-family:"Noto Serif TC",serif;font-weight:900;color:var(--cinnabar);font-size:1.4rem;margin-bottom:.2rem}
.modal .target{background:rgba(178,58,46,.1);border-radius:8px;padding:.5rem .7rem;margin:.6rem 0 1rem;color:var(--ink)}
.modal label{display:block;font-weight:700;margin:.9rem 0 .35rem}
.modal textarea,.modal input[type=text],.modal input[type=url]{width:100%;border:1px solid var(--line);
  border-radius:8px;padding:.6rem;font-family:inherit;font-size:1rem;background:#fff8ec}
.modal textarea{min-height:90px;resize:vertical}
.imgrow,.lkrow{display:flex;gap:.5rem;margin:.4rem 0;align-items:center}
.imgrow img{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--line)}
.chip-x{border:0;background:var(--paper-deep);border-radius:6px;padding:.3rem .55rem}
.addbtn{border:1px dashed var(--jade);background:transparent;color:var(--jade-dark);border-radius:8px;padding:.45rem .8rem;margin-top:.4rem}
.modal .foot{display:flex;gap:.7rem;justify-content:flex-end;margin-top:1.4rem}
.modal .foot button{border:0;border-radius:9px;padding:.6rem 1.3rem;font-weight:700}
.btn-cancel{background:var(--paper-deep);color:var(--ink)}
.btn-save{background:var(--cinnabar);color:#fff}
.muted{color:var(--ink-soft);font-size:.85rem}

@media(max-width:760px){
  #reader{grid-template-columns:1fr}
  #sidebar{position:fixed;left:0;top:50px;bottom:0;width:78%;z-index:40;transform:translateX(-100%);
    transition:.25s;max-height:none}
  #sidebar.open{transform:translateX(0)}
  .sb-toggle{display:inline-block!important}
}
.sb-toggle{display:inline-block;border:1px solid var(--line);background:#fff8ec;border-radius:8px;padding:.3rem .65rem;font-size:1.05rem;color:var(--ink-soft)}
.sb-toggle:hover{background:var(--paper-deep)}
</style>
</head>
<body>

<!-- ===== top bar ===== -->
<div class="topbar">
  <button class="sb-toggle" id="sbToggle" aria-label="目錄">☰</button>
  <a href="#/" class="home"><img class="seal-img" src="assets/seal.png" alt="智勇"><span>智勇人才班教材</span></a>
  <div class="spacer"></div>
  <div class="fsctl" title="拖曳調整字級大小">
    <span class="a-end a-sm">A</span>
    <input type="range" id="fsRange" min="90" max="190" step="5" value="100" aria-label="字級大小">
    <span class="a-end a-lg">A</span>
  </div>
  <button class="present-btn" id="presentBtn" title="簡報模式（滿版）">簡報</button>
  <div class="mode" id="modeBox">
    <span class="dot"></span><span id="modeLabel">瀏覽</span>
    <button id="modeBtn">切換編輯</button>
  </div>
</div>

<!-- ===== cover ===== -->
<section id="cover">
  <div class="scroll-bg"></div>
  <div class="inner">
    <img class="logo" src="assets/wordmark-white.png" alt="智勇 ZHI YONG">
    <h1>智勇人才班教材</h1>
    <div class="sub" id="coverSub">ZHI YONG ‧ 道學講堂</div>
    <div class="frontrow" id="frontRow"></div>
    <div class="toc-title">目　錄</div>
    <div class="chaptergrid" id="chapterGrid"></div>
  </div>
</section>

<!-- ===== reader ===== -->
<section id="reader" class="hidden">
  <aside id="sidebar"></aside>
  <main id="content"></main>
</section>

<button id="sel-btn">＋ 加註解</button>

<!-- side panel -->
<div id="panel">
  <div class="pcard">
    <button class="close" id="panelClose">×</button>
    <div id="panelBody"></div>
  </div>
</div>

<!-- modal -->
<div id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, push, update, remove }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
/* ============================================================
   CONFIG  —  Firebase 專案 zhiyong（Realtime Database，新加坡節點）。
   圖片以壓縮後 base64 存進 Realtime Database，不使用付費的 Storage。
   ============================================================ */
const firebaseConfig = {
  apiKey:        "AIzaSyAzclm2Zav8t9G78RNErcYJDX_jacW5b-M",
  authDomain:    "zhiyong-71ee9.firebaseapp.com",
  databaseURL:   "https://zhiyong-71ee9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:     "zhiyong-71ee9",
  messagingSenderId: "319490692836",
  appId:         "1:319490692836:web:45fc275371675b40ff7ef1"
};
const EDITOR_PASSWORD = "zhiyong";          // 講者密碼（之後可改）
const FIREBASE_ON = !firebaseConfig.apiKey.startsWith("PASTE");

let db=null;
if (FIREBASE_ON){
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);
}

/* compress an image file to a base64 data URL (no Storage needed) */
function compressImage(file, maxDim=1280, quality=0.8){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>maxDim||h>maxDim){const r=Math.min(maxDim/w,maxDim/h);w=Math.round(w*r);h=Math.round(h*r);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      resolve(cv.toDataURL('image/jpeg',quality));
    };
    img.onerror=reject;
    const fr=new FileReader();fr.onload=()=>img.src=fr.result;fr.onerror=reject;fr.readAsDataURL(file);
  });
}

/* ---------- state ---------- */
let DATA=null;
let annByRow={};            // rowId -> [annotation,...]
let annAll={};              // pushId -> annotation (with _key)
let editMode=false;
let currentChapterId=null;
let pendingSel=null;        // {rowId,start,end,text}
let editingKey=null;        // when editing existing annotation

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

/* ---------- font scale (slider) ---------- */
let fsVal=+(localStorage.getItem('zy_fs2')||100);
function applyFs(){fsVal=Math.max(90,Math.min(190,fsVal));
  document.documentElement.style.setProperty('--reading-scale',(fsVal/100).toFixed(2));
  const r=$('#fsRange'); if(r) r.value=fsVal;
  localStorage.setItem('zy_fs2',fsVal);}
$('#fsRange').oninput=e=>{fsVal=+e.target.value;applyFs();};

/* ---------- mode ---------- */
function setMode(on){
  editMode=on;
  const box=$('#modeBox');
  box.classList.toggle('edit',on);
  $('#modeLabel').textContent=on?'編輯':'瀏覽';
  $('#modeBtn').textContent=on?'結束編輯':'切換編輯';
  if(!on) hideSelBtn();
}
$('#modeBtn').onclick=()=>{
  if(editMode){setMode(false);return;}
  if(!FIREBASE_ON){alert('雲端尚未設定，編輯功能將於填入 Firebase 設定後啟用。');return;}
  const p=prompt('請輸入講者密碼以進入編輯模式：');
  if(p===null)return;
  if(p===EDITOR_PASSWORD){sessionStorage.setItem('zy_edit','1');setMode(true);}
  else alert('密碼錯誤');
};
if(sessionStorage.getItem('zy_edit')==='1' && FIREBASE_ON){/* will enable after load */}

/* ---------- load content ---------- */
async function boot(){
  applyFs();
  DATA=await fetch('content.json').then(r=>r.json());
  $('#coverSub').textContent=DATA.subtitle||'';
  buildCover(); buildSidebar();
  if(FIREBASE_ON) listenAnnotations();
  if(sessionStorage.getItem('zy_edit')==='1' && FIREBASE_ON) setMode(true);
  window.addEventListener('hashchange',route); route();
}

/* ---------- cover ---------- */
function buildCover(){
  const fr=$('#frontRow'); fr.innerHTML='';
  const m=DATA.frontMatter.motto, pf=DATA.frontMatter.preface;
  const a1=el('a','fcard',`<span class="mk">訓</span>${esc(m.title)}`);a1.href='#/front/motto';
  const a2=el('a','fcard',`<span class="mk">序</span>${esc(pf.title)}`);a2.href='#/front/preface';
  fr.append(a1,a2);
  const g=$('#chapterGrid'); g.innerHTML='';
  DATA.chapters.forEach(ch=>{
    const parts=ch.title.split('、');
    const num=parts[0], nm=parts.slice(1).join('、')||ch.title;
    const a=el('a','chcard',`<span class="num">${esc(num)}</span><span class="nm">${esc(nm)}</span>`);
    a.href=`#/chapter/${ch.id}`; g.append(a);
  });
}

/* ---------- sidebar ---------- */
function buildSidebar(){
  const sb=$('#sidebar'); sb.innerHTML='';
  const home=el('a','sb-home','▸ 回封面目錄'); home.href='#/'; sb.append(home);
  DATA.chapters.forEach(ch=>{
    const wrap=el('div','sb-ch'); wrap.dataset.ch=ch.id;
    const a=el('a',null,esc(ch.title)); a.href=`#/chapter/${ch.id}`; wrap.append(a);
    const secs=el('div','sb-secs');
    ch.sections.forEach(s=>{ if(!s.title)return;
      const sa=el('a',null,esc(s.title)); sa.href=`#/chapter/${ch.id}#${s.id}`; secs.append(sa);});
    wrap.append(secs); sb.append(wrap);
  });
}
function markSidebar(){
  document.querySelectorAll('.sb-ch').forEach(e=>e.classList.toggle('active',e.dataset.ch===currentChapterId));
}

/* ---------- routing ---------- */
function route(){
  const h=location.hash.replace(/^#\//,'');
  if(h.startsWith('front/')){ showReader(); renderFront(h.split('/')[1]); return; }
  if(h.startsWith('chapter/')){
    const id=h.split('/')[1].split('#')[0];
    showReader(); renderChapter(id);
    const anchor=location.hash.split('#')[2];
    if(anchor){const t=document.getElementById(anchor);if(t)t.scrollIntoView({behavior:'smooth'});}
    return;
  }
  showCover();
}
function showCover(){document.body.classList.add('on-cover');$('#cover').classList.remove('hidden');$('#reader').classList.add('hidden');window.scrollTo(0,0);}
function showReader(){document.body.classList.remove('on-cover');$('#cover').classList.add('hidden');$('#reader').classList.remove('hidden');}

/* ---------- render front matter ---------- */
function renderFront(which){
  currentChapterId=null; markSidebar();
  const c=$('#content'); c.innerHTML='';
  if(which==='motto'){
    const m=DATA.frontMatter.motto;
    c.append(el('div','ch-head',`<div class="seal-num">訓</div><h2>${esc(m.title)}</h2>`));
    m.lines.forEach(l=>c.append(el('p','motto-line',esc(l))));
  }else{
    const pf=DATA.frontMatter.preface;
    c.append(el('div','ch-head',`<div class="seal-num">序</div><h2>${esc(pf.title)}</h2>`));
    const u=el('div','unit quote'); u.dataset.unit='front-preface';
    u.innerHTML=renderText('front-preface',pf.text); c.append(u);
    c.append(el('p','unit',`<div style="text-align:right;color:var(--ink-soft)">${esc(pf.sign)}</div>`));
  }
  window.scrollTo(0,0);
}

/* ---------- render chapter ---------- */
function renderChapter(id){
  const ch=DATA.chapters.find(c=>c.id===id); if(!ch){showCover();return;}
  currentChapterId=id; markSidebar();
  const parts=ch.title.split('、');
  const c=$('#content'); c.innerHTML='';
  c.append(el('div','ch-head',`<div class="seal-num">${esc(parts[0])}</div><h2>${esc(parts.slice(1).join('、'))}</h2>`));
  ch.sections.forEach(s=>{
    if(s.title){
      const sh=el('div','sec-head',`<span class="bar"></span><h3>${esc(s.title)}</h3>`);
      sh.id=s.id; c.append(sh);
    }
    s.units.forEach(u=>{
      const d=el('div','unit '+(u.kind==='quote'?'quote':'prose'));
      d.dataset.unit=u.id; d.innerHTML=renderText(u.id,u.text); c.append(d);
    });
  });
  window.scrollTo(0,0);
}

/* ---------- text + annotation rendering ---------- */
function renderText(rowId,text){
  const anns=(annByRow[rowId]||[]).slice().sort((a,b)=>a.startOffset-b.startOffset);
  let out='',i=0,k=0;
  const push=(seg)=>{out+=esc(seg).replace(/\n/g,'<br>');};
  while(i<text.length){
    const a=anns[k];
    if(a && i===a.startOffset && a.endOffset>a.startOffset){
      out+=`<mark class="anno" data-key="${a._key}">`;
      push(text.slice(a.startOffset,a.endOffset));
      out+='</mark>';
      i=a.endOffset; k++;
      while(anns[k] && anns[k].startOffset<i) k++;   // skip overlaps
    }else{
      let next=text.length;
      for(let j=k;j<anns.length;j++){if(anns[j].startOffset>=i){next=anns[j].startOffset;break;}}
      push(text.slice(i,next)); i=next;
    }
  }
  return out;
}

/* ---------- compute char offset within a unit ---------- */
function offsetOf(root,node,off){
  let acc=0,done=false,res=0;
  (function walk(n){
    if(done)return;
    if(n===node && n.nodeType===3){res=acc+off;done=true;return;}
    if(n.nodeType===3){acc+=n.nodeValue.length;return;}
    if(n.nodeName==='BR'){acc+=1;}
    if(n===node && n.nodeType===1){ // selection endpoint at element level
      for(let j=0;j<off;j++) walk(n.childNodes[j]);
      res=acc;done=true;return;
    }
    for(const c of n.childNodes){walk(c);if(done)return;}
  })(root);
  return done?res:acc;
}

/* ---------- selection -> add annotation ---------- */
const selBtn=$('#sel-btn');
function hideSelBtn(){selBtn.style.display='none';pendingSel=null;}
document.addEventListener('mouseup',e=>{
  if(!editMode)return;
  if(e.target===selBtn)return;
  setTimeout(()=>{
    const sel=window.getSelection();
    if(!sel || sel.isCollapsed || !sel.rangeCount){hideSelBtn();return;}
    const unit=sel.anchorNode.parentElement?.closest('[data-unit]');
    const unit2=sel.focusNode.parentElement?.closest('[data-unit]');
    if(!unit || unit!==unit2){hideSelBtn();return;}
    let s=offsetOf(unit,sel.anchorNode,sel.anchorOffset);
    let en=offsetOf(unit,sel.focusNode,sel.focusOffset);
    if(s>en)[s,en]=[en,s];
    if(en-s<1){hideSelBtn();return;}
    const txt=unitText(unit.dataset.unit).slice(s,en);
    pendingSel={rowId:unit.dataset.unit,start:s,end:en,text:txt};
    const r=sel.getRangeAt(0).getBoundingClientRect();
    selBtn.style.display='block';
    selBtn.style.left=(window.scrollX+r.left+r.width/2-40)+'px';
    selBtn.style.top=(window.scrollY+r.top-44)+'px';
  },10);
});
selBtn.onclick=()=>{ if(pendingSel){editingKey=null;openModal(pendingSel);} };

function unitText(rowId){
  if(rowId==='front-preface')return DATA.frontMatter.preface.text;
  for(const ch of DATA.chapters)for(const s of ch.sections)for(const u of s.units)
    if(u.id===rowId)return u.text;
  return '';
}

/* ---------- click annotation ---------- */
document.addEventListener('click',e=>{
  const m=e.target.closest('mark.anno'); if(!m)return;
  const ann=annAll[m.dataset.key]; if(!ann)return;
  if(editMode){editingKey=m.dataset.key;openModal({rowId:ann.rowId,start:ann.startOffset,end:ann.endOffset,text:ann.selectedText},ann);}
  else openPanel(ann);
});

/* ---------- view panel ---------- */
function openPanel(ann){
  const b=$('#panelBody');
  let html=`<div class="quote-of">「${esc(ann.selectedText)}」</div>`;
  if(ann.note) html+=`<div class="note">${esc(ann.note)}</div>`;
  (ann.images||[]).forEach(im=>html+=`<img src="${esc(im.url)}" alt="">`);
  (ann.links||[]).forEach(lk=>html+=`<a class="lk" href="${esc(lk.url)}" target="_blank" rel="noopener">🔗 ${esc(lk.label||lk.url)}</a>`);
  b.innerHTML=html; $('#panel').classList.add('open');
}
$('#panelClose').onclick=()=>$('#panel').classList.remove('open');

/* ---------- edit modal ---------- */
function openModal(sel,ann){
  hideSelBtn();
  let images=ann?JSON.parse(JSON.stringify(ann.images||[])):[];
  let links=ann?JSON.parse(JSON.stringify(ann.links||[])):[];
  const m=$('#modal');
  m.innerHTML=`
    <h3>${ann?'編輯註解':'新增註解'}</h3>
    <div class="target">針對：「${esc(sel.text)}」</div>
    <label>敘述</label>
    <textarea id="m-note" placeholder="輸入說明文字…">${ann?esc(ann.note||''):''}</textarea>
    <label>圖片 <span class="muted">（可上傳或貼網址，多張）</span></label>
    <div id="m-imgs"></div>
    <div style="display:flex;gap:.5rem">
      <button class="addbtn" id="m-upload">⬆ 上傳圖片</button>
      <button class="addbtn" id="m-imgurl">＋ 貼圖片網址</button>
      <input type="file" id="m-file" accept="image/*" class="hidden">
    </div>
    <label style="margin-top:1rem">連結 <span class="muted">（多個）</span></label>
    <div id="m-links"></div>
    <button class="addbtn" id="m-addlink">＋ 新增連結</button>
    <div class="foot">
      ${ann?'<button class="btn-cancel" id="m-del" style="margin-right:auto;background:#e7c3bd;color:#7a241c">刪除</button>':''}
      <button class="btn-cancel" id="m-cancel">取消</button>
      <button class="btn-save" id="m-save">儲存</button>
    </div>`;
  $('#overlay').classList.add('open');

  const drawImgs=()=>{const c=$('#m-imgs');c.innerHTML='';images.forEach((im,idx)=>{
    const row=el('div','imgrow',`<img src="${esc(im.url)}"><span class="muted" style="flex:1;word-break:break-all">${esc(im.type==='upload'?'（已上傳）':im.url)}</span>`);
    const x=el('button','chip-x','移除');x.onclick=()=>{images.splice(idx,1);drawImgs();};row.append(x);c.append(row);});};
  const drawLinks=()=>{const c=$('#m-links');c.innerHTML='';links.forEach((lk,idx)=>{
    const row=el('div','lkrow');
    row.innerHTML=`<input type="text" placeholder="標題" value="${esc(lk.label||'')}" style="flex:1">
                   <input type="url" placeholder="https://" value="${esc(lk.url||'')}" style="flex:2">`;
    const ins=row.querySelectorAll('input');
    ins[0].oninput=e=>lk.label=e.target.value; ins[1].oninput=e=>lk.url=e.target.value;
    const x=el('button','chip-x','✕');x.onclick=()=>{links.splice(idx,1);drawLinks();};row.append(x);c.append(row);});};
  drawImgs();drawLinks();

  $('#m-addlink').onclick=()=>{links.push({label:'',url:''});drawLinks();};
  $('#m-imgurl').onclick=()=>{const u=prompt('貼上圖片網址：');if(u)images.push({url:u,type:'link'}),drawImgs();};
  $('#m-upload').onclick=()=>$('#m-file').click();
  $('#m-file').onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    $('#m-upload').textContent='處理中…';
    try{
      const url=await compressImage(f);
      if(url.length>1400000) alert('圖片偏大，建議換較小的圖以利載入。');
      images.push({url,type:'upload'});drawImgs();
    }catch(err){alert('圖片處理失敗：'+err.message);}
    $('#m-upload').textContent='⬆ 上傳圖片';
    e.target.value='';
  };
  $('#m-cancel').onclick=closeModal;
  if(ann)$('#m-del').onclick=async()=>{ if(confirm('確定刪除此註解？')){await remove(ref(db,'annotations/'+editingKey));closeModal();} };
  $('#m-save').onclick=async()=>{
    const note=$('#m-note').value.trim();
    const cleanLinks=links.filter(l=>l.url&&l.url.trim());
    const rec={rowId:sel.rowId,selectedText:sel.text,startOffset:sel.start,endOffset:sel.end,
      note,images,links:cleanLinks,author:'講者',updatedAt:Date.now()};
    try{
      if(editingKey){await update(ref(db,'annotations/'+editingKey),rec);}
      else{rec.createdAt=Date.now();await push(ref(db,'annotations'),rec);}
      closeModal();
    }catch(err){alert('儲存失敗：'+err.message);}
  };
}
function closeModal(){$('#overlay').classList.remove('open');editingKey=null;
  const s=window.getSelection();if(s)s.removeAllRanges();}
$('#overlay').onclick=e=>{if(e.target===$('#overlay'))closeModal();};

/* ---------- firebase listener ---------- */
function listenAnnotations(){
  onValue(ref(db,'annotations'),snap=>{
    annAll={};annByRow={};
    const v=snap.val()||{};
    Object.entries(v).forEach(([k,a])=>{a._key=k;annAll[k]=a;(annByRow[a.rowId]||(annByRow[a.rowId]=[])).push(a);});
    rerenderVisible();
  });
}
function rerenderVisible(){
  document.querySelectorAll('[data-unit]').forEach(u=>{
    u.innerHTML=renderText(u.dataset.unit,unitText(u.dataset.unit));
  });
}

/* ---------- misc ---------- */
$('#sbToggle').onclick=()=>{
  if(window.innerWidth<=760) $('#sidebar').classList.toggle('open');
  else $('#reader').classList.toggle('nav-collapsed');
};
$('#presentBtn').onclick=()=>{
  const on=document.body.classList.toggle('present-mode');
  $('#presentBtn').classList.toggle('on',on);
  $('#reader').classList.toggle('nav-collapsed',on);
};
$('#panel').onclick=e=>{if(e.target.id==='panel')$('#panel').classList.remove('open');};
document.addEventListener('click',e=>{
  if(window.innerWidth<=760 && e.target.closest('.sb-secs a, .sb-ch>a')) $('#sidebar').classList.remove('open');
});

boot();
</script>
